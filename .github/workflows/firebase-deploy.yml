name: Deploy to Firebase

# main 또는 claude/* 브랜치에 푸시되면 자동으로 Firebase Hosting에 배포한다.
on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Firebase 공식 액션으로 호스팅(HTML)을 라이브 채널에 배포
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: team-tops-intranet
          channelId: live

      # Firestore 보안 규칙(firestore.rules)도 함께 배포 — push_tokens 등 모든 컬렉션 허용 보장
      - name: Write service account key
        run: |
          cat > "$RUNNER_TEMP/gcp-sa.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
      - name: Deploy Firestore & Storage rules
        run: npx -y firebase-tools@13 deploy --only firestore:rules,storage --project team-tops-intranet --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
